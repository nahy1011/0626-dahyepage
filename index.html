<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다현 ❤️ 혜윤</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;500;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <p class="days-together">Days Together: <span id="days-count"></span> ❤️</p>
            <h1>Dahyeon <span class="heart">❤️</span> Hyeyoon</h1>
        </header>

        <section class="card combined-card">
            <div class="image-wrapper-large">
                <img src="assets/combined.png" alt="다현 혜윤 커플과 반려 동물들">
            </div>
        </section>

        <section class="card schedule-card">
            <h2>📅 Our Special Dates</h2>
            <form id="schedule-form" class="schedule-form">
                <input type="date" id="schedule-date" required>
                <input type="text" id="schedule-desc" placeholder="What are we doing?" required>
                <button type="submit" class="btn-add">Add Event</button>
            </form>
            <ul id="schedule-list" class="schedule-list">
                <!-- Schedules will be added here via JS -->
            </ul>
        </section>

        <section class="card verse-card">
            <h2>📖 오늘의 말씀!</h2>
            <button id="verse-btn" class="btn-add">말씀 뽑기</button>
            <div id="verse-result" class="verse-result">
                <p class="verse-text">버튼을 눌러 오늘의 말씀을 뽑아보세요!</p>
                <p class="verse-ref"></p>
            </div>
        </section>

        <section class="card dice-card">
            <h2>🎲 오늘의 주인공은?</h2>
            <div class="scene">
                <div class="cube" id="dice">
                    <div class="cube__face cube__face--front">혜윤</div>
                    <div class="cube__face cube__face--right">쪼</div>
                    <div class="cube__face cube__face--back">다현</div>
                    <div class="cube__face cube__face--left">보검</div>
                    <div class="cube__face cube__face--top">구찌</div>
                    <div class="cube__face cube__face--bottom">까미</div>
                </div>
            </div>
            <button id="roll-btn" class="btn-add roll-btn">주사위 굴리기!</button>
            <p id="dice-result" class="dice-result">버튼을 눌러 주인공을 뽑아보세요!</p>
        </section>

        <section class="card roulette-card">
            <h2>🍽️ 오늘은 뭐먹을랭?</h2>
            <div class="roulette-container">
                <div class="roulette-pointer">▼</div>
                <canvas id="roulette" width="300" height="300"></canvas>
            </div>
            <button id="spin-btn" class="btn-add roll-btn">룰렛 돌리기!</button>
            <p id="roulette-result" class="dice-result">버튼을 눌러 메뉴를 골라보세요!</p>
        </section>
    </div>

    <script src="script.js?v=2"></script>
</body>
</html>
